# Quintana Seguros — Airtable CRM integration config
#
# IMPORTANT: This file is committed to version control.
# It must NOT contain any secret values. The api_key_env field references
# the NAME of an environment variable that holds the real Airtable PAT.
#
# Setup:
#   1. Set QUINTANA_AIRTABLE_API_KEY in the server/staging .env to a real
#      Airtable Personal Access Token scoped to the base below.
#
# Rollback: rename or delete this file. Zero code changes needed.

provider: airtable

# Real Airtable base + leads table.
base_id: appw59LRBdv95UPpB
table_id: tblsWumwwfeoqkWid

# Name of the environment variable that holds the Airtable Personal Access Token.
# The secret value itself is NEVER stored here.
api_key_env: QUINTANA_AIRTABLE_API_KEY

# Matching field: leads are upserted by email.
# Airtable's lead_id is a numeric field populated by Meta — it does NOT match
# Qora's internal UUID. Email is the shared unique identifier that Airtable
# supports for upsert (phone type is not supported for merge-on).
# TODO: when import stores the numeric Meta lead_id in a Qora field, switch
# back to match_field: lead_id for stronger idempotency.
match_field: "Correo electrónico"

# Status mapping: Qora internal status → Airtable singleSelect value.
# Values MUST match exactly the singleSelect choices in the Airtable table
# (case-sensitive, with accents). If a Qora status is absent from this map,
# the raw Qora value is used as fallback.
status_mapping:
  new: "Nuevo!"
  called: "Contactado (en espera)"
  quoted: "Cotizado"
  interested: "COMPRÓ"
  not_interested: "Perdido"
  follow_up: "Recontactar"

# Reverse status mapping: Airtable singleSelect value → Qora internal status.
# Used during import (Airtable → Qora) to translate CRM status values back.
# If an Airtable status is absent from this map, the raw value is stored.
import_status_mapping:
  "Nuevo!": new
  "Contactado (en espera)": called
  "Cotizado": quoted
  "COMPRÓ": interested
  "Perdido": not_interested
  "Recontactar": follow_up

# Field mappings: Qora lead fields → Airtable column names.
# Only fields Qora produces today are mapped. Airtable-automation fields
# (Creada, Last_Update, Fecha_*) and Meta campaign fields come from n8n, not Qora.
# singleSelect fields (Status, etc.) are translated via status_mapping above.
# Add or remove entries here; no code changes required (FM-6).
field_mappings:
  # NOTE: lead_id in Airtable is a numeric field populated by Meta.
  # Qora's internal id is a UUID and must NOT be pushed to that field.
  # When Qora gets a numeric external_lead_id field, add the mapping back.

  - source: name
    target: "Nombre Completo"
    type: string

  - source: phone
    target: "Teléfono"
    type: phone

  - source: email
    target: "Correo electrónico"
    type: string

  - source: status
    target: "Status"
    type: string

  - source: current_insurance
    target: "Poliza_Actual"
    type: string

  - source: car_make
    target: "Marca_Auto"
    type: string

  - source: car_model
    target: "Modelo_Auto"
    type: string

  - source: car_year
    target: "Año_Auto"
    type: string

  - source: age
    target: "Edad"
    type: integer

  - source: zona
    target: "Zona"
    type: string
