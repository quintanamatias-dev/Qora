# Alembic configuration for Qora backend.
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file's directory)
script_location = alembic

# Default database URL — async SQLite. Override via DATABASE_URL env var or
# by passing a URL to alembic.config.Config before calling command.upgrade.
# NOTE: alembic CLI commands use a sync driver; the env.py async runner is
# invoked programmatically by scripts/migrate.py using asyncio.
# %(here)s is substituted by Alembic with the directory containing alembic.ini
# (i.e. backend/), making this path deterministic regardless of cwd.
sqlalchemy.url = sqlite+aiosqlite:///%(here)s/qora.db

# Timezone for migration timestamps in generated revision files (UTC keeps diffs clean)
[alembic:output_options]

# ------------------------------------------------------------------
# Logging configuration for alembic CLI output
# ------------------------------------------------------------------
[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
