version: "3.9"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: qora-n8n-local
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      N8N_ENCRYPTION_KEY: change-me-before-sharing
      N8N_BLOCK_ENV_ACCESS_IN_NODE: false
      QORA_BACKEND_URL: http://host.docker.internal:8000
      QORA_INTERNAL_SECRET: qora-n8n-local-secret-2026
    volumes:
      - n8n_local_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_local_data:
